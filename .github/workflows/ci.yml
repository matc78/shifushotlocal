name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: stable
          cache: true

      - name: Install deps
        run: flutter pub get

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib test

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Run tests with coverage
        run: flutter test --coverage --reporter expanded

      - name: Coverage summary
        if: always()
        run: |
          if [ -f coverage/lcov.info ]; then
            covered=$(awk -F, '/^DA:/ { total++; if ($2+0 > 0) hit++ } END { printf "%d %d", hit, total }' coverage/lcov.info)
            hit=$(echo $covered | cut -d' ' -f1)
            total=$(echo $covered | cut -d' ' -f2)
            pct=$(awk "BEGIN { printf \"%.1f\", ($hit/$total)*100 }")
            echo "## Coverage: $pct% ($hit/$total lines on instrumented files)" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: ignore
